services:
  openai-batch-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: williamwinkler/openai-batch-manager:latest
    ports:
      - "4001:4001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Docker-specific DB URL; defaults to host Postgres exposed on 5432.
      DATABASE_URL: ${DATABASE_URL_DOCKER:-ecto://postgres:postgres@host.docker.internal:5432/openai_batch_manager}
      PORT: 4001
      # Optional RabbitMQ intake/delivery:
      RABBITMQ_URL: ${RABBITMQ_URL_DOCKER:-amqp://guest:guest@host.docker.internal:5672}
      RABBITMQ_INPUT_QUEUE: ${RABBITMQ_INPUT_QUEUE:-batch_requests}
    volumes:
      - openai-batch-manager-data:/data
    logging: # Optional
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  openai-batch-manager-data:
